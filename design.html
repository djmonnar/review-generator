<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>현수막 시안 자동 생성기 by 짓마케팅</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- 무료 이미지 합성용 라이브러리 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <!-- 한글 디자인 폰트 -->
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Jua&family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; }
        .yh-bg { background-color: #1e293b; }
        .yh-accent { background-color: #3b82f6; }
        .yh-accent-hover:hover { background-color: #2563eb; }
        .loader { border: 3px solid #f3f3f3; border-radius: 50%; border-top: 3px solid #3b82f6; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">
    <div class="bg-white rounded-3xl shadow-xl w-full max-w-xl overflow-hidden border border-gray-200">
        
        <!-- 헤더 영역 -->
        <div class="yh-bg p-7 text-white text-center relative">
            <span class="bg-white/20 text-white text-xs font-bold px-3 py-1 rounded-full mb-3 inline-block border border-white/30">짓마케팅 제공</span>
            <h1 class="text-2xl font-bold mb-2 flex justify-center items-center gap-2">
                <i class="fas fa-bullhorn"></i> 현수막 시안 뚝딱이
            </h1>
            <p class="text-sm text-gray-300 font-medium">원하는 문구와 분위기만 고르세요.<br>무료 AI가 오타 없이 완벽한 시안을 완성해 드립니다.</p>
        </div>

        <div class="p-6 space-y-6">
            
            <!-- 행사 카테고리 -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">행사 카테고리 (선택) 🎉</label>
                <div class="flex flex-wrap gap-2">
                    <label class="cursor-pointer"><input type="radio" name="eventType" value="" class="peer sr-only" checked><div class="px-3 py-1.5 text-xs border border-gray-200 text-gray-600 rounded-full peer-checked:bg-blue-500 peer-checked:text-white transition-all font-semibold">선택 안함</div></label>
                    <label class="cursor-pointer"><input type="radio" name="eventType" value="돌잔치" class="peer sr-only"><div class="px-3 py-1.5 text-xs border border-gray-200 text-gray-600 rounded-full peer-checked:bg-blue-500 peer-checked:text-white transition-all font-semibold">돌잔치</div></label>
                    <label class="cursor-pointer"><input type="radio" name="eventType" value="환갑" class="peer sr-only"><div class="px-3 py-1.5 text-xs border border-gray-200 text-gray-600 rounded-full peer-checked:bg-blue-500 peer-checked:text-white transition-all font-semibold">환갑</div></label>
                    <label class="cursor-pointer"><input type="radio" name="eventType" value="칠순" class="peer sr-only"><div class="px-3 py-1.5 text-xs border border-gray-200 text-gray-600 rounded-full peer-checked:bg-blue-500 peer-checked:text-white transition-all font-semibold">칠순</div></label>
                    <label class="cursor-pointer"><input type="radio" name="eventType" value="팔순" class="peer sr-only"><div class="px-3 py-1.5 text-xs border border-gray-200 text-gray-600 rounded-full peer-checked:bg-blue-500 peer-checked:text-white transition-all font-semibold">팔순</div></label>
                    <label class="cursor-pointer"><input type="radio" name="eventType" value="구순" class="peer sr-only"><div class="px-3 py-1.5 text-xs border border-gray-200 text-gray-600 rounded-full peer-checked:bg-blue-500 peer-checked:text-white transition-all font-semibold">구순</div></label>
                </div>
            </div>

            <!-- 현수막 문구 -->
            <div>
                <label for="bannerText" class="block text-sm font-bold text-gray-700 mb-2">현수막에 들어갈 문구 ✍️</label>
                <textarea id="bannerText" rows="3" class="w-full border border-gray-300 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none text-sm transition-all" placeholder="예: 아버지 팔순을 축하 드립니다! 건강하게 오래오래 함께해요 사랑합니다 💖"></textarea>
            </div>

            <!-- 사이즈 선택 -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">현수막 사이즈 📏</label>
                <div class="grid grid-cols-3 gap-2">
                    <label class="cursor-pointer">
                        <input type="radio" name="bannerSize" value="가로형" class="peer sr-only" checked onchange="toggleCustomSize()">
                        <div class="text-center py-2.5 text-sm border border-gray-200 text-gray-600 rounded-xl peer-checked:bg-blue-500 peer-checked:text-white transition-all font-semibold shadow-sm hover:bg-gray-50 flex flex-col justify-center h-full">가로형<br><span class="text-[10px] opacity-80 mt-1">(일반 벽면)</span></div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="bannerSize" value="정사각형" class="peer sr-only" onchange="toggleCustomSize()">
                        <div class="text-center py-2.5 text-sm border border-gray-200 text-gray-600 rounded-xl peer-checked:bg-blue-500 peer-checked:text-white transition-all font-semibold shadow-sm hover:bg-gray-50 flex flex-col justify-center h-full">정사각형<br><span class="text-[10px] opacity-80 mt-1">(SNS용)</span></div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="bannerSize" value="custom" class="peer sr-only" id="customSizeRadio" onchange="toggleCustomSize()">
                        <div class="text-center py-2.5 text-sm border border-gray-200 text-gray-600 rounded-xl peer-checked:bg-blue-500 peer-checked:text-white transition-all font-semibold shadow-sm hover:bg-gray-50 flex flex-col justify-center h-full">직접 입력<br><span class="text-[10px] opacity-80 mt-1">(비율 자동)</span></div>
                    </label>
                </div>
                <input type="text" id="customSizeInput" class="w-full border border-gray-300 rounded-xl p-3 mt-2 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm hidden" placeholder="예: 200x50 (가로x세로 숫자를 적어주세요)">
            </div>

            <!-- 분위기 선택 -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">디자인 분위기 🎨</label>
                <div class="grid grid-cols-2 gap-2">
                    <label class="cursor-pointer"><input type="radio" name="bannerVibe" value="고급스럽고 세련된 프리미엄 스타일" class="peer sr-only" checked><div class="text-center py-2 text-sm border border-gray-200 text-gray-600 rounded-lg peer-checked:bg-gray-800 peer-checked:text-white transition-all font-semibold">✨ 고급/세련</div></label>
                    <label class="cursor-pointer"><input type="radio" name="bannerVibe" value="시선을 사로잡는 강렬하고 눈에 띄는 스타일" class="peer sr-only"><div class="text-center py-2 text-sm border border-gray-200 text-gray-600 rounded-lg peer-checked:bg-gray-800 peer-checked:text-white transition-all font-semibold">🔥 강렬/눈에띔</div></label>
                    <label class="cursor-pointer"><input type="radio" name="bannerVibe" value="트렌디하고 감성적인 인스타 스타일" class="peer sr-only"><div class="text-center py-2 text-sm border border-gray-200 text-gray-600 rounded-lg peer-checked:bg-gray-800 peer-checked:text-white transition-all font-semibold">📸 감성/트렌디</div></label>
                    <label class="cursor-pointer"><input type="radio" name="bannerVibe" value="친근하고 캐주얼한 따뜻한 스타일" class="peer sr-only"><div class="text-center py-2 text-sm border border-gray-200 text-gray-600 rounded-lg peer-checked:bg-gray-800 peer-checked:text-white transition-all font-semibold">🥰 친근/따뜻함</div></label>
                </div>
            </div>

            <!-- 톤 선택 -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">전체 색상 톤 🌈</label>
                <div class="grid grid-cols-4 gap-2">
                    <label class="cursor-pointer"><input type="radio" name="bannerTone" value="밝고 화사한 톤" class="peer sr-only" checked><div class="text-center py-2 text-xs border border-gray-200 text-gray-600 rounded-lg peer-checked:bg-yellow-400 peer-checked:text-gray-900 transition-all font-bold">밝은 톤</div></label>
                    <label class="cursor-pointer"><input type="radio" name="bannerTone" value="어둡고 묵직한 톤" class="peer sr-only"><div class="text-center py-2 text-xs border border-gray-200 text-gray-600 rounded-lg peer-checked:bg-gray-900 peer-checked:text-white transition-all font-bold">어두운 톤</div></label>
                    <label class="cursor-pointer"><input type="radio" name="bannerTone" value="원색 중심의 쨍한 톤" class="peer sr-only"><div class="text-center py-2 text-xs border border-gray-200 text-gray-600 rounded-lg peer-checked:bg-red-500 peer-checked:text-white transition-all font-bold">원색(쨍함)</div></label>
                    <label class="cursor-pointer"><input type="radio" name="bannerTone" value="부드러운 파스텔 톤" class="peer sr-only"><div class="text-center py-2 text-xs border border-gray-200 text-gray-600 rounded-lg peer-checked:bg-pink-300 peer-checked:text-gray-900 transition-all font-bold">파스텔</div></label>
                </div>
            </div>

            <button id="generateBtn" onclick="generateBanner()" class="w-full yh-accent yh-accent-hover text-white font-bold py-3.5 px-4 rounded-xl shadow-lg transition-all flex justify-center items-center mt-4">
                <span>AI 현수막 시안 생성하기 🎨</span>
            </button>
            <p id="errorMsg" class="text-red-500 text-sm text-center font-medium hidden mt-2"></p>
        </div>

        <!-- 결과 영역 -->
        <div id="resultSection" class="bg-gray-50 p-6 border-t border-gray-200 hidden">
            <h3 class="text-sm font-bold text-gray-800 mb-3"><i class="fas fa-image text-blue-500"></i> ✨ 완성된 초고화질 시안</h3>
            
            <!-- ⭐ 레이아웃 붕괴를 막는 핵심 구조 (relative + absolute) ⭐ -->
            <div id="captureArea" class="bg-white rounded-xl shadow-inner border border-gray-300 mb-4 overflow-hidden w-full relative">
                <!-- 배경 레이어 -->
                <img id="bgLayer" crossorigin="anonymous" src="" class="absolute top-0 left-0 w-full h-full object-cover z-0 hidden">
                <!-- 가독성을 위한 오버레이 레이어 -->
                <div id="overlayLayer" class="absolute top-0 left-0 w-full h-full z-10 opacity-30 hidden"></div>
                <!-- 텍스트 레이어 (앱솔루트로 고정되어 상자를 늘리지 않음) -->
                <div id="textLayer" class="absolute top-0 left-0 w-full h-full z-20 p-6 md:p-8 leading-snug whitespace-pre-wrap break-keep flex flex-col justify-center"></div>
            </div>

            <button id="downloadBtn" onclick="downloadBanner()" class="w-full bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 px-4 rounded-xl transition-all flex justify-center items-center gap-2">
                <i class="fas fa-download"></i> 고화질 이미지로 저장하기
            </button>
            <p class="text-xs text-green-600 font-bold text-center mt-3">※ 무료 기술을 적용하여 글씨가 깨지거나 오타가 발생하지 않습니다!</p>
            
            <!-- 짓마케팅 업셀링 배너 -->
            <div class="mt-6 bg-gradient-to-r from-blue-900 to-gray-800 rounded-xl p-4 text-center shadow-lg border border-gray-700">
                <p class="text-yellow-400 text-xs font-bold mb-1">🎉 현수막 시안이 마음에 드시나요?</p>
                <p class="text-white text-sm font-medium mb-3">더 완벽한 맞춤형 현수막 디자인과 마케팅이 필요하다면<br>언제든 짓마케팅에 문의해 주세요!</p>
                <a href="https://pf.kakao.com/_lPcZX" target="_blank" class="inline-block bg-white text-blue-900 text-sm font-bold py-2 px-4 rounded-lg hover:bg-gray-100 transition-colors w-full flex items-center justify-center gap-2">
                    <i class="fas fa-comment-dots text-yellow-500"></i> 짓마케팅 카카오톡 상담하기
                </a>
            </div>
        </div>
    </div>

    <script>
        function toggleCustomSize() {
            const isCustom = document.getElementById('customSizeRadio').checked;
            const input = document.getElementById('customSizeInput');
            if(isCustom) input.classList.remove('hidden');
            else input.classList.add('hidden');
        }

        async function generateBanner() {
            const rawBannerText = document.getElementById('bannerText').value.trim();
            const eventType = document.querySelector('input[name="eventType"]:checked').value;
            const vibe = document.querySelector('input[name="bannerVibe"]:checked').value;
            const tone = document.querySelector('input[name="bannerTone"]:checked').value;
            let size = document.querySelector('input[name="bannerSize"]:checked').value;

            const btn = document.getElementById('generateBtn');
            const errorMsg = document.getElementById('errorMsg');
            const resultSection = document.getElementById('resultSection');

            if (!rawBannerText) { 
                errorMsg.textContent = "현수막에 들어갈 문구를 입력해주세요!"; 
                errorMsg.classList.remove('hidden'); 
                return; 
            }

            if (size === 'custom') {
                const customVal = document.getElementById('customSizeInput').value.trim();
                if(!customVal) {
                    errorMsg.textContent = "원하시는 현수막 사이즈를 입력해주세요. (예: 200x50)";
                    errorMsg.classList.remove('hidden');
                    return;
                }
                size = customVal;
            }

            // ⭐ [문제 해결 1] 현수막 글자에 [팔순] 안 나오게 분리!
            // 화면(텍스트 레이어)에는 rawBannerText 만 띄우고, AI에게 보낼 때만 eventType 정보를 함께 보냅니다.

            errorMsg.classList.add('hidden');
            resultSection.classList.add('hidden');
            document.getElementById('bgLayer').classList.add('hidden'); 
            document.getElementById('overlayLayer').classList.add('hidden');
            
            btn.innerHTML = `<div class="loader"></div> <span class="opacity-90">AI가 배경을 그리는 중 (3~5초 소요)...</span>`;
            btn.disabled = true;
            btn.classList.add('opacity-80', 'cursor-not-allowed');

            try {
                const response = await fetch('/api/ai', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        action: 'banner', 
                        bannerText: rawBannerText, // 백엔드에는 원래 텍스트 전달 (백엔드에서 eventType과 합쳐서 이해함)
                        eventType: eventType, 
                        bannerSize: size, 
                        bannerVibe: vibe, 
                        bannerTone: tone
                    })
                });

                if (!response.ok) throw new Error('서버 통신 오류 (API가 응답하지 않습니다.)');
                const data = await response.json();
                const design = data.result;
                
                const captureArea = document.getElementById('captureArea');
                const bgLayer = document.getElementById('bgLayer');
                const overlayLayer = document.getElementById('overlayLayer');
                const textLayer = document.getElementById('textLayer');

                // 1. 캔버스 비율 설정 (레이아웃 붕괴 원천 차단)
                let width = 1200, height = 420;
                if (size === '정사각형') {
                    width = 800; height = 800;
                    captureArea.style.aspectRatio = "1 / 1";
                } else if (size === '가로형') {
                    captureArea.style.aspectRatio = "20 / 7";
                } else {
                    const matches = size.match(/(\d+)[xX*×\s]+(\d+)/);
                    if (matches && matches.length >= 3) {
                        let w = parseInt(matches[1]); let h = parseInt(matches[2]);
                        captureArea.style.aspectRatio = `${w} / ${h}`;
                        if(w >= h) { width = 1000; height = Math.round(1000 * (h / w)); }
                        else { height = 1000; width = Math.round(1000 * (w / h)); }
                    } else {
                        captureArea.style.aspectRatio = "20 / 7"; 
                    }
                }

                // 2. 텍스트 레이어 디자인 적용 (오직 대표님이 쓴 내용만!)
                textLayer.textContent = rawBannerText; 
                textLayer.style.color = design.textColor || '#000000';
                textLayer.style.fontFamily = `'${design.fontType}', sans-serif`;
                textLayer.style.textShadow = design.textShadow || 'none';
                textLayer.style.textAlign = design.textAlign || 'center';
                textLayer.style.fontWeight = design.fontWeight || '700';
                
                // ⭐ [문제 해결 2] 글자 수에 맞춰서 안전한 단위(rem)로 폰트 크기 계산 (레이아웃 보호)
                let baseRem = 2.0;
                if (rawBannerText.length > 15) baseRem = 1.6;
                if (rawBannerText.length > 30) baseRem = 1.2;
                if (size === '정사각형') baseRem *= 1.4;
                textLayer.style.fontSize = `${baseRem}rem`;

                // 3. 배경 오버레이 적용 (가독성 증가)
                if (tone.includes('어둡') || design.textColor.includes('FFF') || design.textColor.includes('fff')) {
                    overlayLayer.style.backgroundColor = '#000000';
                    overlayLayer.classList.remove('hidden');
                } else if (tone.includes('밝') || tone.includes('파스텔')) {
                    overlayLayer.style.backgroundColor = '#ffffff';
                    overlayLayer.classList.remove('hidden');
                }

                // 4. 이미지 로딩 (빠른 엔진)
                const randomSeed = Math.floor(Math.random() * 100000);
                const bgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(design.bgPrompt)}?width=${width}&height=${height}&nologo=true&model=flux&seed=${randomSeed}`;
                
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 20000); // 20초 대기
                
                try {
                    const imgResponse = await fetch(bgUrl, { signal: controller.signal });
                    clearTimeout(timeoutId);
                    
                    if (!imgResponse.ok) throw new Error("이미지 서버가 바쁩니다.");
                    
                    const blob = await imgResponse.blob();
                    bgLayer.src = URL.createObjectURL(blob);
                    
                    bgLayer.onload = () => {
                        bgLayer.classList.remove('hidden'); 
                        resultSection.classList.remove('hidden');
                        setTimeout(() => resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
                        
                        btn.innerHTML = `<span>AI 현수막 시안 생성하기 🎨</span>`;
                        btn.disabled = false;
                        btn.classList.remove('opacity-80', 'cursor-not-allowed');
                    };
                } catch (fetchError) {
                    clearTimeout(timeoutId);
                    throw new Error("무료 이미지 서버가 너무 바빠 배경을 그리지 못했습니다. 한 번 더 [생성하기] 버튼을 눌러주세요!");
                }

            } catch (error) {
                errorMsg.textContent = "알림: " + error.message;
                errorMsg.classList.remove('hidden');
                
                btn.innerHTML = `<span>AI 현수막 시안 생성하기 🎨</span>`;
                btn.disabled = false;
                btn.classList.remove('opacity-80', 'cursor-not-allowed');
            }
        }

        async function downloadBanner() {
            const dlBtn = document.getElementById('downloadBtn');
            const originalHtml = dlBtn.innerHTML;
            dlBtn.innerHTML = `<div class="loader" style="border-top-color:#fff;"></div> <span class="opacity-90">이미지 저장 중...</span>`;
            dlBtn.disabled = true;

            try {
                const canvas = await html2canvas(document.getElementById('captureArea'), {
                    useCORS: true, 
                    scale: 3 
                });
                
                const link = document.createElement('a');
                link.download = '짓마케팅_현수막시안.jpg';
                link.href = canvas.toDataURL('image/jpeg', 0.9);
                link.click();
            } catch (error) {
                alert('이미지 다운로드에 실패했습니다. 잠시 후 다시 시도해주세요.');
            } finally {
                dlBtn.innerHTML = originalHtml;
                dlBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
