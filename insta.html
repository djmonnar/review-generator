<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인스타그램 원고 & 해시태그 자동 생성기 by 짓마케팅</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #fafafa; }
        .insta-bg { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .insta-text { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .loader { border: 3px solid #f3f3f3; border-radius: 50%; border-top: 3px solid #dc2743; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* 스크롤바 커스텀 (인스타 감성) */
        textarea::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        textarea::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
        textarea::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">
    <!-- 메인 컨테이너 -->
    <div class="bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.08)] w-full max-w-lg overflow-hidden border border-gray-100">
        
        <!-- 헤더 영역 -->
        <div class="insta-bg p-7 text-white text-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-full bg-black opacity-10"></div>
            <div class="relative z-10">
                <span class="bg-white/20 backdrop-blur-sm text-white text-xs font-bold px-3 py-1 rounded-full mb-3 inline-block border border-white/30">짓마케팅 제공</span>
                <h1 class="text-2xl font-bold mb-2 flex justify-center items-center gap-2">
                    <i class="fab fa-instagram text-2xl"></i> 인스타 원고 뚝딱이
                </h1>
                <p class="text-sm text-white/90 font-medium">사진은 준비됐는데 글 쓰기가 막막하신가요?<br>대충 적어도 AI가 찰떡같이 써드립니다.</p>
            </div>
        </div>

        <!-- 입력 폼 영역 -->
        <div class="p-6 space-y-6">
            
            <!-- 1. 매장 정보 입력 -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">업종 🏪</label>
                    <input type="text" id="businessType" class="w-full border border-gray-200 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-[#dc2743] focus:border-transparent text-sm transition-all bg-gray-50 focus:bg-white" placeholder="예: 삼겹살 고깃집, 미용실">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">지역명 📍</label>
                    <input type="text" id="locationName" class="w-full border border-gray-200 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-[#dc2743] focus:border-transparent text-sm transition-all bg-gray-50 focus:bg-white" placeholder="예: 강남역, 해운대, 성수동">
                </div>
            </div>

            <!-- 2. 홍보 내용 입력 -->
            <div>
                <label for="promoContent" class="block text-sm font-bold text-gray-700 mb-2">오늘 알리고 싶은 내용 ✍️</label>
                <textarea id="promoContent" rows="3" class="w-full border border-gray-200 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-[#dc2743] focus:border-transparent resize-none text-sm transition-all bg-gray-50 focus:bg-white" placeholder="대충 메모하듯 적어주세요.&#10;예: 비오는 날 파전+막걸리 세트 20% 할인 이벤트 시작함! 선착순 10팀."></textarea>
            </div>

            <!-- 3. 글 분위기 선택 -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">원하는 글의 분위기 🎨</label>
                <div class="grid grid-cols-2 gap-2">
                    <label class="cursor-pointer">
                        <input type="radio" name="tone" value="감성적이고 트렌디한 인스타 감성 카페 스타일" class="peer sr-only" checked>
                        <div class="text-center py-2.5 text-sm border border-gray-200 text-gray-600 rounded-xl peer-checked:bg-gradient-to-tr peer-checked:from-yellow-400 peer-checked:via-red-500 peer-checked:to-pink-600 peer-checked:text-white peer-checked:border-transparent transition-all font-semibold shadow-sm hover:bg-gray-50 peer-checked:hover:opacity-90">✨ 감성 듬뿍</div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="tone" value="친근하고 다정한 동네 단골집 사장님 스타일" class="peer sr-only">
                        <div class="text-center py-2.5 text-sm border border-gray-200 text-gray-600 rounded-xl peer-checked:bg-gradient-to-tr peer-checked:from-yellow-400 peer-checked:via-red-500 peer-checked:to-pink-600 peer-checked:text-white peer-checked:border-transparent transition-all font-semibold shadow-sm hover:bg-gray-50 peer-checked:hover:opacity-90">🥰 다정/친근</div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="tone" value="텐션 높고 유쾌하며 센스 터지는 젊은 사장님 스타일" class="peer sr-only">
                        <div class="text-center py-2.5 text-sm border border-gray-200 text-gray-600 rounded-xl peer-checked:bg-gradient-to-tr peer-checked:from-yellow-400 peer-checked:via-red-500 peer-checked:to-pink-600 peer-checked:text-white peer-checked:border-transparent transition-all font-semibold shadow-sm hover:bg-gray-50 peer-checked:hover:opacity-90">🔥 텐션 폭발</div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="tone" value="전문성이 느껴지고 신뢰감을 주는 깔끔한 정보전달 스타일" class="peer sr-only">
                        <div class="text-center py-2.5 text-sm border border-gray-200 text-gray-600 rounded-xl peer-checked:bg-gradient-to-tr peer-checked:from-yellow-400 peer-checked:via-red-500 peer-checked:to-pink-600 peer-checked:text-white peer-checked:border-transparent transition-all font-semibold shadow-sm hover:bg-gray-50 peer-checked:hover:opacity-90">📋 신뢰/전문</div>
                    </label>
                </div>
            </div>

            <!-- 생성 버튼 -->
            <button id="generateBtn" onclick="generateInstaPost()" class="w-full insta-bg text-white font-bold py-3.5 px-4 rounded-xl shadow-lg hover:shadow-xl hover:-translate-y-0.5 transition-all flex justify-center items-center mt-2">
                <span>AI 원고 & 해시태그 뽑기 🚀</span>
            </button>
            <p id="errorMsg" class="text-red-500 text-sm text-center font-medium hidden mt-2"></p>
        </div>

        <!-- 결과 출력 영역 (초기엔 숨김) -->
        <div id="resultSection" class="bg-gray-50/50 p-6 border-t border-gray-100 hidden relative">
            
            <div class="flex justify-between items-center mb-3">
                <label class="block text-sm font-bold text-gray-800">✨ 완성된 인스타 원고</label>
                <button onclick="copyToClipboard('resultText', 'copyMsg1')" class="text-xs text-gray-500 hover:text-[#dc2743] font-semibold flex items-center gap-1 transition-colors">
                    <i class="far fa-copy"></i> 본문 복사
                </button>
            </div>
            
            <!-- 원고 텍스트 에리어 -->
            <textarea id="resultText" rows="10" class="w-full border border-gray-200 rounded-xl p-4 focus:outline-none focus:ring-2 focus:ring-[#dc2743] resize-none bg-white text-gray-800 leading-relaxed text-sm shadow-inner mb-1"></textarea>
            <p id="copyMsg1" class="text-green-600 text-xs font-bold text-right hidden mb-4">본문이 복사되었습니다!</p>

            <!-- 해시태그 영역 -->
            <div class="mt-4 mb-2 flex justify-between items-center">
                <label class="block text-sm font-bold text-gray-800"><i class="fas fa-hashtag text-[#bc1888]"></i> 추천 해시태그 (지역+업종 최적화)</label>
                <button onclick="copyToClipboard('hashtags', 'copyMsg2')" class="text-xs text-gray-500 hover:text-[#dc2743] font-semibold flex items-center gap-1 transition-colors">
                    <i class="far fa-copy"></i> 태그 복사
                </button>
            </div>
            <div class="bg-white border border-gray-200 rounded-xl p-3 shadow-inner">
                <p id="hashtags" class="text-[#00376b] text-sm leading-relaxed font-medium break-words"></p>
            </div>
            <p id="copyMsg2" class="text-green-600 text-xs font-bold text-right hidden mt-1">해시태그가 복사되었습니다!</p>

            <!-- 짓마케팅 업셀링(Up-selling) 배너 -->
            <div class="mt-6 bg-gradient-to-r from-gray-900 to-gray-800 rounded-xl p-4 text-center shadow-lg border border-gray-700">
                <p class="text-yellow-400 text-xs font-bold mb-1">🔥 원고는 준비 완료!</p>
                <p class="text-white text-sm font-medium mb-3">이 글을 동네 사람들에게 광고해서<br>실제 매출로 연결하고 싶으신가요?</p>
                <a href="#" class="inline-block bg-white text-gray-900 text-sm font-bold py-2 px-4 rounded-lg hover:bg-gray-100 transition-colors w-full">
                    짓마케팅에 스폰서드 광고 문의하기 👉
                </a>
            </div>
        </div>
    </div>

    <!-- 로직 스크립트 -->
    <script>
        async function callBackend(payloadData) {
            const response = await fetch('/api/ai', { // Vercel 백엔드 URL
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payloadData)
            });
            
            if (!response.ok) {
                let errorData;
                try { errorData = await response.json(); } catch(e) { throw new Error('서버와 연결할 수 없습니다.'); }
                throw new Error(errorData.error || '서버 통신 오류');
            }
            return await response.json();
        }

        async function generateInstaPost() {
            const businessType = document.getElementById('businessType').value.trim();
            const locationName = document.getElementById('locationName').value.trim();
            const promoContent = document.getElementById('promoContent').value.trim();
            const tone = document.querySelector('input[name="tone"]:checked').value;
            
            const btn = document.getElementById('generateBtn');
            const errorMsg = document.getElementById('errorMsg');
            const resultSection = document.getElementById('resultSection');

            // 필수 입력값 검증
            if (!businessType || !locationName || !promoContent) { 
                errorMsg.textContent = "업종, 지역명, 홍보 내용을 모두 입력해주세요!"; 
                errorMsg.classList.remove('hidden'); 
                return; 
            }

            errorMsg.classList.add('hidden');
            resultSection.classList.add('hidden');
            
            // 로딩 상태
            btn.innerHTML = `<div class="loader"></div> <span class="opacity-90">AI가 인스타 감성 듬뿍 담는 중...</span>`;
            btn.disabled = true;
            btn.classList.add('opacity-80', 'cursor-not-allowed');

            try {
                // Vercel 서버의 action: 'insta' 로 요청을 보냅니다.
                const data = await callBackend({ 
                    action: 'insta', 
                    businessType: businessType,
                    locationName: locationName,
                    promoContent: promoContent,
                    tone: tone 
                });
                
                // UI 업데이트
                document.getElementById('resultText').value = data.result.caption;
                document.getElementById('hashtags').textContent = data.result.hashtags.join(' ');
                
                resultSection.classList.remove('hidden');
                
                // 자연스러운 스크롤
                setTimeout(() => {
                    resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 100);
                
            } catch (error) {
                errorMsg.textContent = "오류 발생: " + error.message;
                errorMsg.classList.remove('hidden');
            } finally {
                btn.innerHTML = `<span>AI 원고 & 해시태그 뽑기 🚀</span>`;
                btn.disabled = false;
                btn.classList.remove('opacity-80', 'cursor-not-allowed');
            }
        }

        function copyToClipboard(elementId, msgId) {
            let textToCopy = "";
            const element = document.getElementById(elementId);
            
            if(element.tagName === 'TEXTAREA') {
                textToCopy = element.value;
            } else {
                textToCopy = element.textContent;
            }

            const successMsg = document.getElementById(msgId);
            const textArea = document.createElement("textarea");
            textArea.value = textToCopy;
            document.body.appendChild(textArea);
            textArea.select();
            
            try {
                document.execCommand('copy');
                successMsg.classList.remove('hidden');
                setTimeout(() => { successMsg.classList.add('hidden'); }, 2000);
            } catch (err) {
                alert('복사에 실패했습니다. 직접 텍스트를 드래그해서 복사해주세요.');
            }
            document.body.removeChild(textArea);
        }
    </script>
</body>
</html>
